<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="180" viewBox="0 0 1200 180">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A24" stroke-width="0.6"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E63946" stop-opacity="0.45"/>
      <stop offset="55%"  stop-color="#E63946" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="bannerClip">
      <rect width="1200" height="180"/>
    </clipPath>
  </defs>

  <rect width="1200" height="180" fill="#0A0A0F"/>
  <rect width="1200" height="180" fill="url(#grid)" opacity="0.25"/>

  <!-- RIPPLE RINGS  dur=6s, offsets=1.5s apart — slow and professional -->
  <g clip-path="url(#bannerClip)">

    <circle cx="600" cy="90" r="1" fill="none" stroke="#E63946" stroke-width="11">
      <animate attributeName="r"       values="1;750" dur="6s" begin="0s"   repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0"   dur="6s" begin="0s"   repeatCount="indefinite"/>
    </circle>

    <circle cx="600" cy="90" r="1" fill="none" stroke="#E63946" stroke-width="9">
      <animate attributeName="r"       values="1;750" dur="6s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="6s" begin="1.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="600" cy="90" r="1" fill="none" stroke="#E0831B" stroke-width="7">
      <animate attributeName="r"       values="1;750" dur="6s" begin="3s"   repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="6s" begin="3s"   repeatCount="indefinite"/>
    </circle>

    <circle cx="600" cy="90" r="1" fill="none" stroke="#FFB700" stroke-width="5">
      <animate attributeName="r"       values="1;750" dur="6s" begin="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="6s" begin="4.5s" repeatCount="indefinite"/>
    </circle>

  </g>

  <!-- CENTRE — clean pulsing dot, no text -->
  <!-- soft slow glow -->
  <circle cx="600" cy="90" r="60" fill="url(#glow)">
    <animate attributeName="r"       values="60;78;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1"  dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- solid core dot -->
  <circle cx="600" cy="90" r="22" fill="#E63946"/>
  <!-- slow clean halo ring -->
  <circle cx="600" cy="90" r="22" fill="none" stroke="#E63946" stroke-width="2.5">
    <animate attributeName="r"       values="22;46;22" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!--
    MECHANIC DOTS — recalculated for dur=6s
    flash_begin = ring_begin + (dist / 750) * 6s,  dot dur = 6s

    Dot A (440,45)  dist≈166  Ring1(0s):   (166/750)*6 = 1.33s
    Dot B (762,40)  dist≈170  Ring1(0s):   (170/750)*6 = 1.36s
    Dot C (335,125) dist≈267  Ring2(1.5s): 1.5+(267/750)*6 = 3.64s
    Dot D (865,132) dist≈268  Ring2(1.5s): 1.5+(268/750)*6 = 3.64s
    Dot E (185,68)  dist≈416  Ring3(3s):   3+(416/750)*6  = 6.33s
    Dot F (1018,52) dist≈420  Ring3(3s):   3+(420/750)*6  = 6.36s
  -->

  <circle cx="440" cy="45" r="5" fill="#FFB700" opacity="0.25">
    <animate attributeName="opacity" values="0.25;1;0.6;0.25" keyTimes="0;0.08;0.2;1" dur="6s" begin="1.33s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="5;9;6;5"          keyTimes="0;0.08;0.2;1" dur="6s" begin="1.33s" repeatCount="indefinite"/>
  </circle>

  <circle cx="762" cy="40" r="5" fill="#FFB700" opacity="0.25">
    <animate attributeName="opacity" values="0.25;1;0.6;0.25" keyTimes="0;0.08;0.2;1" dur="6s" begin="1.36s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="5;9;6;5"          keyTimes="0;0.08;0.2;1" dur="6s" begin="1.36s" repeatCount="indefinite"/>
  </circle>

  <circle cx="335" cy="125" r="5" fill="#FFB700" opacity="0.25">
    <animate attributeName="opacity" values="0.25;1;0.6;0.25" keyTimes="0;0.08;0.2;1" dur="6s" begin="3.64s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="5;9;6;5"          keyTimes="0;0.08;0.2;1" dur="6s" begin="3.64s" repeatCount="indefinite"/>
  </circle>

  <circle cx="865" cy="132" r="5" fill="#FFB700" opacity="0.25">
    <animate attributeName="opacity" values="0.25;1;0.6;0.25" keyTimes="0;0.08;0.2;1" dur="6s" begin="3.64s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="5;9;6;5"          keyTimes="0;0.08;0.2;1" dur="6s" begin="3.64s" repeatCount="indefinite"/>
  </circle>

  <circle cx="185" cy="68" r="5" fill="#FFB700" opacity="0.25">
    <animate attributeName="opacity" values="0.25;1;0.6;0.25" keyTimes="0;0.08;0.2;1" dur="6s" begin="6.33s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="5;9;6;5"          keyTimes="0;0.08;0.2;1" dur="6s" begin="6.33s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1018" cy="52" r="5" fill="#FFB700" opacity="0.25">
    <animate attributeName="opacity" values="0.25;1;0.6;0.25" keyTimes="0;0.08;0.2;1" dur="6s" begin="6.36s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="5;9;6;5"          keyTimes="0;0.08;0.2;1" dur="6s" begin="6.36s" repeatCount="indefinite"/>
  </circle>

</svg>
